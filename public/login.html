
<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="box">
    <form id="loginForm" class="login-box">
        <h2>Login Admin</h2>
        <input type="text" id="loginEmail" placeholder="Usuário" required>
        <input type="password" id="loginPassword" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>
    <form id="registerForm" class="cadastro-box">
        <h2>Cadastre-se</h2>
        <input type="text" id="registerEmail" placeholder="Usuário" required>
        <input type="password" id="registerPassword" placeholder="Senha" required>
        <input type="password" id="registerPasswordConfirm" placeholder="Confirmar senha" required>
        <button type="submit" class="cadastro-button">Cadastrar-se</button>
    </form>
</div>

<script src="auth.js"></script>

</body>
