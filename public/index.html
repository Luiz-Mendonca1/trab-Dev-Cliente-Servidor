
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
    <nav class="menu-lateral">
        <div class="btn-expandir">
            <i class="bi bi-list"></i>
        </div>
        <!-- Botão de Expansão Final -->

        <!-- Avatar ADM -->
        <ul>
            <li class="item-menu">
                <a href="login.html" target="_blank">
                    <span class="icon"><i class="bi bi-person-circle"></i></span>
                    <span class="txt-link">Admin</span>
                </a>
            </li>
            
        </ul>
    </nav>
    <section class="autoria">
        <h3>Trabalho feito por:</h3>
        <span>Luiz Eduardo, Samuel Carvalho, João Lucas, Igor Gomes</span>
    </section>

    <div class="container">
        <h1>Gerenciamento de Estoque</h1>
        
        <form id="produto-form">
            <input type="hidden" id="produto-id">
            <input type="text" id="nome" placeholder="Nome do Produto" required>
            <input type="number" id="preco" step="0.01" placeholder="Preço (Ex: 25.50)" required>
            <input type="number" id="quantidade" placeholder="Quantidade em Estoque" required>
            <input type="text" id="categoria" placeholder="Categoria" required>
            <button type="submit" id="btn-salvar">Cadastrar Produto</button>
        </form>

        <hr>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Qtd.</th>
                    <th>Categoria</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-produtos"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
